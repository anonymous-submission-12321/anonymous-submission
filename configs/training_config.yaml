# Training Configuration for QLoRA Fine-tuning on Linux Command Generation

# Global settings
global_settings:
  cache_file: "./cache/linux_commands_dataset.json"
  tokenized_cache_dir: "./tokenized_cache"
  output_base_dir: "./results"
  
  # Hardware settings
  num_workers: 4
  use_fp16: true
  optimizer: "paged_adamw_8bit"  
  
  # Quantization settings 
  quantization:
    load_in_4bit: true           # 4-bit loading Enabled
    bnb_4bit_compute_dtype: "float16"  # Compute dtype float16
    bnb_4bit_quant_type: "nf4"   # Quant type NF4
    bnb_4bit_use_double_quant: true  # Double quantization Enabled

# Model-specific configurations
models:
  # Llama-3.2-1B - BS=4, GA=4, GC=Off
  - name: "llama-3.2-1b-linux-v1"
    base_model_path: "./models/meta-llama/Llama-3.2-1B"
    hf_repo_id: "meta-llama/Llama-3.2-1B"
    enabled: true
    
    # LoRA configuration 
    lora:
      r: 16                          # Rank (r) 16
      alpha: 32                       # Alpha (α) 32
      dropout: 0.1                     # Dropout 0.1
      target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]  # Target modules
      bias: "none"                     # Bias none
    
    # Training hyperparameters 
    training:
      num_epochs: 3                    # Num epochs 3
      batch_size: 4                     # BS=4
      gradient_accumulation_steps: 4    # GA=4
      learning_rate: 2.0e-4             # Learning rate 2 × 10⁻⁴
      warmup_steps: 100                  # Warmup steps 100
      save_steps: 500                    # Save steps 500
      eval_steps: 500                    # Eval steps 500
      logging_steps: 10
      save_total_limit: 2
      
    # Model-specific settings
    disable_gradient_checkpointing: true  # GC=Off
    max_seq_length: 512                   # Sequence length 512

  # Qwen2.5-1.5B - BS=8, GA=2, GC=Off
  - name: "qwen2.5-1.5b-linux-v1"
    base_model_path: "./models/Qwen/Qwen2.5-1.5B-Instruct"
    hf_repo_id: "Qwen/Qwen2.5-1.5B-Instruct"
    enabled: true
    
    lora:
      r: 16
      alpha: 32
      dropout: 0.1
      target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
      bias: "none"
    
    training:
      num_epochs: 3
      batch_size: 8                     # BS=8
      gradient_accumulation_steps: 2    # GA=2
      learning_rate: 2.0e-4
      warmup_steps: 100
      save_steps: 500
      eval_steps: 500
      logging_steps: 10
      save_total_limit: 2
    
    disable_gradient_checkpointing: true  # GC=Off
    max_seq_length: 512

  # Gemma-3-1B - BS=8, GA=2, GC=Off
  - name: "gemma-3-1b-linux-v1"
    base_model_path: "./models/google/gemma-3-1b-it"
    hf_repo_id: "google/gemma-3-1b-it"
    enabled: true
    
    lora:
      r: 16
      alpha: 32
      dropout: 0.1
      target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
      bias: "none"
    
    training:
      num_epochs: 3
      batch_size: 8                     # BS=8
      gradient_accumulation_steps: 2    # GA=2
      learning_rate: 2.0e-4
      warmup_steps: 100
      save_steps: 500
      eval_steps: 500
      logging_steps: 10
      save_total_limit: 2
    
    disable_gradient_checkpointing: true  # GC=Off
    max_seq_length: 512

  # Phi-3-mini - BS=4, GA=4, GC=On
  - name: "phi-3-mini-linux-v1"
    base_model_path: "./models/microsoft/Phi-3-mini-4k-instruct"
    hf_repo_id: "microsoft/Phi-3-mini-4k-instruct"
    enabled: true
    
    lora:
      r: 16
      alpha: 32
      dropout: 0.1
      target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
      bias: "none"
    
    training:
      num_epochs: 3
      batch_size: 4                     # BS=4
      gradient_accumulation_steps: 4    # GA=4
      learning_rate: 2.0e-4
      warmup_steps: 100
      save_steps: 500
      eval_steps: 500
      logging_steps: 10
      save_total_limit: 2
    
    disable_gradient_checkpointing: false  # GC=On (note: GC=On means checkpointing enabled)
    max_seq_length: 512
